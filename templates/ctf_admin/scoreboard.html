{% extends "ctf_admin/ctf_admin_base.html" %}

{% block title %}Scoreboard | CTF-CMD{% endblock %}
{% block page_title %}GLOBAL_SCOREBOARD{% endblock %}

{% block ctf_content %}
<div class="cyber-card">
    <table style="width: 100%; border-collapse: collapse;">
        <thead>
            <tr style="background: var(--ctf-sidebar-bg); border-bottom: 2px solid var(--ctf-border);">
                <th
                    style="padding: 15px; text-align: left; font-size: 0.7rem; color: var(--ctf-accent); font-family: 'Orbitron';">
                    RANK</th>
                <th
                    style="padding: 15px; text-align: left; font-size: 0.7rem; color: var(--ctf-accent); font-family: 'Orbitron';">
                    SQUAD</th>
                <th
                    style="padding: 15px; text-align: left; font-size: 0.7rem; color: var(--ctf-accent); font-family: 'Orbitron';">
                    SOLVES</th>
                <th
                    style="padding: 15px; text-align: left; font-size: 0.7rem; color: var(--ctf-accent); font-family: 'Orbitron';">
                    TOTAL_XP</th>
            </tr>
        </thead>
        <tbody style="font-family: 'JetBrains Mono';">
            <tr style="border-bottom: 1px solid var(--ctf-border);">
                <td style="padding: 15px; font-weight: bold; color: #fbbf24;">#01</td>
                <td style="padding: 15px; font-weight: bold;">Team_Alpha</td>
                <td style="padding: 15px;">12</td>
                <td style="padding: 15px; color: var(--ctf-success); font-weight: bold;">2400</td>
            </tr>
            <tr style="border-bottom: 1px solid var(--ctf-border);">
                <td style="padding: 15px; font-weight: bold; color: #94a3b8;">#02</td>
                <td style="padding: 15px; font-weight: bold;">Shadow_Net</td>
                <td style="padding: 15px;">10</td>
                <td style="padding: 15px; color: var(--ctf-success); font-weight: bold;">2150</td>
            </tr>
        </tbody>
    </table>
</div>
{% endblock %}
