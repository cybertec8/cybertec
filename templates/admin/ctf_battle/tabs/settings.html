<div class="cyber-card">
    <h3 style="margin-top: 0; color: #fff;"><i class='bx bx-cog'></i> Operational Configuration</h3>
    <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.05); margin: 15px 0;">

    <div style="max-width: 600px;">
        <form action="{{ url_for('ctf_battle.admin_update_event_info', event_id=event.id) }}" method="POST">

            <div style="margin-bottom: 20px;">
                <label
                    style="display: block; color: #64748b; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 8px;">Operation
                    Name</label>
                <input type="text" name="name" value="{{ event.name }}" class="form-control"
                    placeholder="e.g. Operation Cyber Siege"
                    style="background: #020617; border: 1px solid var(--admin-border); color: #fff; width: 100%; padding: 10px; border-radius: 4px;"
                    required>
            </div>

            <div style="margin-bottom: 20px;">
                <label
                    style="display: block; color: #64748b; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 8px;">Mission
                    Parameters (Description)</label>
                <textarea name="description" class="form-control" rows="4"
                    style="background: #020617; border: 1px solid var(--admin-border); color: #fff; width: 100%; padding: 10px; border-radius: 4px;">{{ event.description }}</textarea>
            </div>

            <div style="margin-bottom: 20px;">
                <label
                    style="display: block; color: #64748b; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 8px;">Visibility
                    Profile</label>
                <select name="visibility" class="form-control"
                    style="background: #020617; border: 1px solid var(--admin-border); color: #fff; width: 100%; padding: 10px; border-radius: 4px;">
                    <option value="Public" {% if event.visibility=='Public' %}selected{% endif %}>Public - Visible to
                        all intercepted agents</option>
                    <option value="Private" {% if event.visibility=='Private' %}selected{% endif %}>Private - Manual
                        deployment only</option>
                </select>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <div>
                    <label
                        style="display: block; color: #64748b; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 8px;">Deployment
                        Start</label>
                    <input type="datetime-local" name="start_time"
                        value="{{ event.start_time.strftime('%Y-%m-%dT%H:%M') }}" class="form-control"
                        style="background: #020617; border: 1px solid var(--admin-border); color: #fff; width: 100%; padding: 10px; border-radius: 4px;">
                </div>
                <div>
                    <label
                        style="display: block; color: #64748b; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 8px;">Deployment
                        End</label>
                    <input type="datetime-local" name="end_time" value="{{ event.end_time.strftime('%Y-%m-%dT%H:%M') }}"
                        class="form-control"
                        style="background: #020617; border: 1px solid var(--admin-border); color: #fff; width: 100%; padding: 10px; border-radius: 4px;">
                </div>
            </div>

            <button type="submit" class="cyber-btn"
                style="background: var(--admin-accent); color: #000; font-weight: 700; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer;">SAVE
                CONFIGURATION</button>
        </form>

        <!-- Destructive Actions -->
        <div style="margin-top: 50px; border-top: 1px solid rgba(239, 68, 68, 0.2); padding-top: 30px;">
            <h4 style="margin-top: 0; color: #ef4444; font-size: 0.8rem; text-transform: uppercase;"><i
                    class='bx bx-error-alt'></i> Danger Zone</h4>
            <p style="color: #64748b; font-size: 0.85rem; margin-bottom: 20px;">Terminating an operation is permanent.
                This will purge all intel, submissions, and solve data associated with this event.</p>

            <form action="{{ url_for('ctf_battle.admin_delete_event', event_id=event.id) }}" method="POST"
                onsubmit="return confirm('CRITICAL ACTION: Are you sure you want to PERMANENTLY TERMINATE this operation? This cannot be undone.');">
                <button type="submit" class="cyber-btn"
                    style="background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); padding: 12px 25px; border-radius: 4px; font-weight: 700; cursor: pointer;">
                    TERMINATE OPERATION & PURGE DATA
                </button>
            </form>
        </div>
    </div>
</div>
