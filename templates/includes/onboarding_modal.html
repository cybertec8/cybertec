<style>
    /* ========================================
       MAPPING DASHBOARD STYLES FOR ONBOARDING
       ======================================== */
    /* Fallback variables to match terminal-style.css if not loaded */
    :root {
        --accent-lime: #84cc16;
        --accent-lime-dark: #65a30d;
        --border-color: rgba(255, 255, 255, 0.1);
    }

    .modal-cyber-compact {
        max-width: 440px;
    }

    .cyber-modal {
        background: var(--bg-secondary) !important;
        border: 1px solid var(--accent-lime) !important;
        color: var(--text-primary) !important;
        border-radius: 4px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        overflow: hidden;
    }

    .modal-header.cyber-modal {
        border-bottom: none !important;
        background: var(--bg-tertiary);
        padding: 20px 20px 10px;
        justify-content: center !important;
        text-align: center;
    }

    .modal-header.cyber-modal .modal-title {
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: var(--accent-lime);
        margin: 0;
    }

    .modal-body.cyber-modal {
        padding: 20px;
        max-height: 70vh;
        overflow-y: auto;
    }

    .modal-body.cyber-modal::-webkit-scrollbar {
        width: 6px;
    }

    .modal-body.cyber-modal::-webkit-scrollbar-thumb {
        background: var(--accent-lime);
        border-radius: 10px;
    }

    .profile-modal-img-container {
        width: 80px;
        height: 80px;
        margin: 0 auto 16px;
        position: relative;
        cursor: pointer;
    }

    .profile-modal-img-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border: 2px solid var(--accent-lime);
        border-radius: 50%;
        background: var(--bg-tertiary);
    }

    .avatar-edit-overlay {
        position: absolute;
        bottom: 0px;
        right: 0px;
        width: 24px;
        height: 24px;
        background: var(--bg-secondary);
        border: 1px solid var(--accent-lime);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        color: var(--accent-lime);
        transition: all 0.2s;
        z-index: 2;
    }

    .profile-modal-img-container:hover .avatar-edit-overlay {
        background: var(--accent-lime);
        color: var(--bg-primary);
    }

    .avatar-edit-overlay svg {
        width: 12px;
        height: 12px;
        fill: currentColor;
    }

    .avatar-grid-compact {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 8px;
        margin-bottom: 15px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid var(--border-color);
        border-radius: 4px;
    }

    .avatar-option {
        cursor: pointer;
        border: 1px solid transparent;
        border-radius: 4px;
        padding: 2px;
        transition: all 0.2s;
    }

    .avatar-option:hover {
        border-color: var(--accent-lime);
        background: rgba(132, 204, 22, 0.1);
    }

    .avatar-option.selected {
        border-color: var(--accent-lime);
        background: rgba(132, 204, 22, 0.2);
        box-shadow: 0 0 10px rgba(132, 204, 22, 0.3);
    }

    .avatar-option img {
        width: 100%;
        border-radius: 2px;
    }

    .cyber-modal .form-label {
        color: var(--text-secondary);
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 4px;
        display: block;
    }

    .cyber-modal .form-input {
        background: var(--bg-primary);
        border: 1px solid var(--border-color);
        font-size: 12px;
        padding: 8px 12px;
        border-radius: 4px;
        width: 100%;
        color: var(--text-primary);
        font-family: 'JetBrains Mono', monospace;
        margin-bottom: 12px;
    }

    .cyber-modal .form-input:focus {
        border-color: var(--accent-lime);
        box-shadow: 0 0 5px rgba(132, 204, 22, 0.3);
        outline: none;
    }

    .cyber-modal .form-input:read-only {
        background: var(--bg-tertiary);
        color: var(--text-muted);
        cursor: not-allowed;
    }

    .btn-upload-avatar {
        display: inline-block;
        font-size: 9px;
        padding: 4px 10px;
        border-radius: 4px;
        border: 1px solid var(--accent-lime);
        color: var(--accent-lime);
        cursor: pointer;
        transition: all 0.2s;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: 600;
        margin-bottom: 15px;
    }

    .btn-upload-avatar:hover {
        background: var(--accent-lime);
        color: var(--bg-primary);
    }

    .modal-footer.cyber-modal {
        border-top: none !important;
        padding: 12px 20px 20px;
        background: var(--bg-tertiary);
        display: flex;
        gap: 10px;
    }

    .btn-cyber-primary {
        background: var(--accent-lime);
        color: var(--bg-primary);
        border: none;
        padding: 8px 16px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        border-radius: 3px;
        flex: 1;
        transition: all 0.2s;
    }

    .btn-cyber-primary:hover {
        background: var(--accent-lime-dark);
        transform: translateY(-1px);
    }

    .btn-cyber-secondary {
        background: transparent;
        color: var(--text-secondary);
        border: 1px solid var(--border-color);
        padding: 8px 16px;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        border-radius: 3px;
        flex: 1;
        transition: all 0.2s;
    }

    .btn-cyber-secondary:hover {
        border-color: var(--text-primary);
        color: var(--text-primary);
    }

    .file-name-display {
        font-size: 9px;
        color: var(--accent-lime);
        margin-left: 8px;
    }
</style>

<!-- ONBOARDING MODAL -->
<div class="modal fade" id="onboardingModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-cyber-compact">
        <div class="modal-content cyber-modal">
            <div class="modal-header cyber-modal">
                <h5 class="modal-title">Complete Your CTF Player Profile</h5>
            </div>
            <form id="onboardingForm" action="{{ url_for('participant.complete_profile') }}" method="POST">
                <div class="modal-body cyber-modal">

                    <!-- Avatar Section -->
                    <div class="text-center">
                        <div class="profile-modal-img-container" id="avatarEditContainer" title="Edit Avatar">
                            <img src="{{ url_for('static', filename='avatars/' ~ (current_user.avatar_filename if current_user.avatar_filename else 'avatar1.png')) }}"
                                alt="Preview" id="onboardingPreview">
                            <div class="avatar-edit-overlay">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
                                    <path
                                        d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168a.5.5 0 0 1 10-10zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207 11.207 2.5zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293l6.5-6.5zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325z" />
                                </svg>
                            </div>
                        </div>
                    </div>

                    <div id="onboardingAvatarGridContainer" style="display: none;">
                        <label class="form-label text-center d-block mb-2">Select Avatar</label>
                        <div class="avatar-grid-compact" id="onboardingAvatarGrid">
                            {% for i in range(1, 13) %}
                            <div class="avatar-option" data-avatar="avatar{{ i }}.png">
                                <img src="{{ url_for('static', filename='avatars/avatar' ~ i ~ '.png') }}"
                                    alt="A{{ i }}">
                            </div>
                            {% endfor %}
                        </div>
                    </div>
                    <input type="hidden" name="selected_avatar" id="onboardingSelectedAvatar"
                        value="{{ current_user.avatar_filename if current_user.avatar_filename else 'avatar1.png' }}">
                    <input type="hidden" name="avatar_type" id="onboardingAvatarType" value="default">

                    <!-- Basic Info -->
                    <div class="form-group">
                        <label class="form-label">Codename (Username)</label>
                        <input type="text" name="username" class="form-input" value="{{ current_user.username }}"
                            required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Registered Email</label>
                        <input type="email" class="form-input" value="{{ current_user.email }}" readonly>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Mobile Number</label>
                        <input type="text" name="mobile_number" class="form-input"
                            value="{{ current_user.mobile_number or '' }}" placeholder="+91XXXXXXXXXX"
                            pattern="[6-9][0-9]{9}"
                            title="Must be a valid 10 digit Indian mobile number starting with 6-9." required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Mission Profile (Biography)</label>
                        <textarea name="bio" class="form-input" rows="2"
                            placeholder="Tell the grid about your expertise...">{{ current_user.bio or '' }}</textarea>
                    </div>

                    <!-- Social Media -->
                    <div class="row">
                        <div class="col-6">
                            <div class="form-group">
                                <label class="form-label">LinkedIn</label>
                                <input type="url" name="linkedin_url" class="form-input"
                                    value="{{ current_user.linkedin_url or '' }}" placeholder="https://...">
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="form-group">
                                <label class="form-label">GitHub</label>
                                <input type="url" name="github_url" class="form-input"
                                    value="{{ current_user.github_url or '' }}" placeholder="https://...">
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Discord Handle</label>
                        <input type="text" name="discord_handle" class="form-input"
                            value="{{ current_user.discord_handle or '' }}" placeholder="codename#0000">
                    </div>

                </div>
                <div class="modal-footer cyber-modal">
                    <button type="button" id="btnSkipOnboarding" class="btn-cyber-secondary">Skip for now</button>
                    <button type="submit" class="btn-cyber-primary">Save Profile</button>
                </div>
            </form>
        </div>
    </div>
</div>
