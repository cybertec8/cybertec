{% extends "base.html" %}

{% block title %}Ctf - Cybertec8{% endblock %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 70vh;">
    <div class="text-center">
        <div class="mb-4">
            <i class='bx bx-lock-alt' style="font-size: 5rem; color: var(--accent-green); opacity: 0.8;"></i>
        </div>
        <h1 class="display-4 fw-bold mb-3" style="color: var(--text-primary); letter-spacing: 2px;">
            CTF Not Started Yet.
        </h1>
        <p class="lead text-secondary mb-5">
            The competition hasn't kicked off. Stay tuned for updates and prepare your tools!
        </p>
        <a href="{{ url_for('home') }}" class="btn btn-join">
            <i class='bx bx-home-alt me-2'></i> Return Home
        </a>
    </div>
</div>

<style>
    .bx-lock-alt {
        animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {

        0%,
        100% {
            transform: scale(1);
            opacity: 0.8;
        }

        50% {
            transform: scale(1.05);
            opacity: 1;
            text-shadow: 0 0 20px var(--accent-green);
        }
    }
</style>
{% endblock %}
